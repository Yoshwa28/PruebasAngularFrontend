<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-title">SIRD</div>
    <div class="brand-subtitle">
      Sistema Integrado de Repositorio<br />
      Digital
    </div>
  </div>

  <nav class="sidebar-nav" aria-label="Menú principal">
    @for (item of menuItems; track item.route) {
      <a
        class="sidebar-link"
        [routerLink]="item.route"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.route === '/app/inicio' }"
      >
        <span class="sidebar-code">{{ item.code }}</span>
        <span class="sidebar-label">{{ item.label }}</span>
      </a>
    }
  </nav>

  <div class="sidebar-footer">
    <strong>OE.8.3.1.7</strong>
    <span>Gobierno Regional del Cusco</span>
  </div>
</aside>

<nav class="mobile-nav" aria-label="Menú móvil principal">
  @for (item of menuItems; track item.route) {
    <a
      [routerLink]="item.route"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: item.route === '/app/inicio' }"
    >
      <strong>{{ item.code }}</strong>
      <span>{{ item.mobileLabel }}</span>
    </a>
  }
</nav>
