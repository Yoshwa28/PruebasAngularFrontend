<header class="topbar">
  <div class="topbar-breadcrumb">
    <span>SIRD</span>
    <strong>/</strong>
    <strong>{{ currentTitle }}</strong>
  </div>

  <div class="topbar-actions">
    <select
      class="topbar-role desktop-only"
      [value]="selectedRoleId()"
      (change)="onRoleChange($event)"
      aria-label="Rol para simulación"
    >
      @for (role of roles; track role.id) {
        <option [value]="role.id">{{ role.label }}</option>
      }
    </select>

    <button
      type="button"
      class="topbar-button desktop-only"
      (click)="resetData()"
    >
      Restablecer datos
    </button>

    <button
      type="button"
      class="topbar-button desktop-only"
      (click)="showAlerts()"
    >
      Avisos
    </button>

    <div class="topbar-user-wrapper">
      <button
        type="button"
        class="topbar-user-trigger"
        aria-label="Abrir menú de usuario"
        [attr.aria-expanded]="userMenuOpen"
        (click)="toggleUserMenu($event)"
      >
        <div class="topbar-user desktop-user-text">
          <strong>{{ fullName() }}</strong>
          <span>{{ username() }}</span>
        </div>

        <div class="topbar-avatar">
          {{ initials() }}
        </div>
      </button>

      @if (userMenuOpen) {
        <div class="user-menu" (click)="$event.stopPropagation()">
          <div class="user-menu-header">
            <div class="user-menu-avatar">
              {{ initials() }}
            </div>

            <div>
              <strong>{{ fullName() }}</strong>
              <span>{{ roleLabel() }}</span>
            </div>
          </div>

          <div class="user-menu-meta">
            <span>{{ username() }}</span>
            <small>{{ position() }}</small>
            <small>{{ dependency() }}</small>
          </div>

          <div class="user-menu-divider"></div>

          <label class="user-menu-role mobile-only">
            <span>Rol de simulación</span>

            <select
              [value]="selectedRoleId()"
              (change)="onRoleChange($event)"
              aria-label="Rol para simulación móvil"
            >
              @for (role of roles; track role.id) {
                <option [value]="role.id">{{ role.label }}</option>
              }
            </select>
          </label>

          <button type="button" class="user-menu-item">
            Mi perfil
          </button>

          <button
            type="button"
            class="user-menu-item"
            (click)="resetData()"
          >
            Restablecer datos
          </button>

          <button
            type="button"
            class="user-menu-item"
            (click)="showAlerts()"
          >
            Avisos
          </button>

          <button
            type="button"
            class="user-menu-item danger"
            (click)="logout()"
          >
            Cerrar sesión
          </button>
        </div>
      }
    </div>
  </div>
</header>
